<!DOCTYPE html>
<html>
<head>
    <title>Test News Feed</title>
    <style>
        body { font-family: sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background: #0a0a0a; color: #f5f5dc; }
        .article { background: rgba(255,255,255,0.05); padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .article:hover { border-color: #00ffcc; }
        .title { font-size: 18px; font-weight: bold; margin-bottom: 8px; color: #00ffcc; }
        .meta { font-size: 12px; color: #999; }
        .loading { text-align: center; padding: 40px; }
        .error { background: rgba(255,0,0,0.1); border-color: red; color: #ff6666; }
        h1 { color: #00ffcc; }
        .stats { background: rgba(0,255,204,0.1); padding: 15px; border-radius: 8px; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>🤖 AI News Feed Test</h1>
    <div class="stats">
        <div>Status: <span id="status">Loading...</span></div>
        <div>Total Articles: <span id="total">-</span></div>
        <div>Last Updated: <span id="updated">-</span></div>
    </div>
    <div id="articles"></div>

    <script>
        async function loadNews() {
            const articlesDiv = document.getElementById('articles');
            const statusSpan = document.getElementById('status');
            const totalSpan = document.getElementById('total');
            const updatedSpan = document.getElementById('updated');
            
            try {
                statusSpan.textContent = 'Fetching...';
                const response = await fetch('https://aiagency-pink.vercel.app/api/news');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                statusSpan.textContent = '✅ Working';
                statusSpan.style.color = '#00ffcc';
                totalSpan.textContent = data.totalArticles;
                updatedSpan.textContent = new Date(data.updatedAt).toLocaleString();
                
                articlesDiv.innerHTML = data.articles.slice(0, 20).map(article => `
                    <div class="article">
                        <div class="title">${article.title}</div>
                        <div class="meta">
                            ${article.source} · ${article.category} · ${new Date(article.publishedAt).toLocaleDateString()}
                        </div>
                        <p>${article.body}</p>
                        <a href="${article.url}" target="_blank" style="color: #00ffcc; text-decoration: none;">Read more →</a>
                    </div>
                `).join('');
                
            } catch (error) {
                statusSpan.textContent = '❌ Error: ' + error.message;
                statusSpan.style.color = '#ff6666';
                articlesDiv.innerHTML = `<div class="article error">Failed to load news: ${error.message}</div>`;
            }
        }
        
        loadNews();
    </script>
</body>
</html>
